<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg" fill="none">
    <defs>
        <!-- Gradients perfectly matched to the glossy image -->
        <linearGradient id="gGrad" x1="0%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#b2df41"/>
            <stop offset="30%" stop-color="#80c83a"/>
            <stop offset="100%" stop-color="#2d7a32"/>
        </linearGradient>
        <linearGradient id="leafGrad" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%" stop-color="#6cba30"/>
            <stop offset="100%" stop-color="#b8e348"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
        </filter>
        <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="foldShadow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#124a13" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#2d7a32" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <g filter="url(#glow)" transform="translate(10, 10)">
        <!-- Main Stalk & G Body carefully traced from the reference image -->
        <path d="M 160 150 
                 C 150 250,  40 250,  40 360 
                 C  40 480, 250 480, 250 360 
                 L 165 360 
                 L 155 385 
                 C 230 450, 100 460,  90 350 
                 C  90 280, 140 250, 150 150 
                 Z" fill="url(#gGrad)"/>

        <!-- Glossy 3D Overlays to match the premium lighting in the reference -->
        <!-- Inner fold shadow on the bottom right -->
        <path d="M 250 360 C 250 380, 250 440, 145 478 C 210 478, 240 430, 240 360 Z" fill="url(#foldShadow)"/>
        <!-- Light highlight on the top left spine for 3D volume -->
        <path d="M 160 150 C 150 250,  40 250,  40 360 C 40 300, 130 250, 150 150 Z" fill="url(#highlight)"/>

        <!-- Two Leaves overlapping perfectly -->
        <path d="M 155 150 C 120 110,  70 110,  50 100 C  80  80, 120 110, 155 150 Z" fill="url(#leafGrad)"/>
        <path d="M 155 150 C 180 110, 230  80, 250  50 C 260  80, 210 130, 155 150 Z" fill="url(#leafGrad)"/>
    </g>
</svg>
